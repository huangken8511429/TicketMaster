server.port=8280

# Dedicated Kafka Streams application-id for event/seat processing
# Independent from api (tm-api) — can scale separately
spring.kafka.streams.application-id=tm-event

# No JPA/database needed — this service only uses Kafka Streams state stores
spring.jpa.hibernate.ddl-auto=none
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Interactive query routing: each instance must advertise its own routable address
# K8s: set KAFKA_STREAMS_APP_SERVER to ${POD_IP}:8280 via env
spring.kafka.streams.properties[application.server]=${KAFKA_STREAMS_APP_SERVER:localhost:${server.port}}
