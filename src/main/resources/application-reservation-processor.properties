server.port=8180

# Dedicated Kafka Streams application-id for reservation routing
spring.kafka.streams.application-id=tm-reservation

# No web server needed — pure Kafka Streams processor (no interactive query)
spring.main.web-application-type=none

# No JPA/database needed
spring.jpa.hibernate.ddl-auto=none
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
