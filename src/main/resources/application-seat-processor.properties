server.port=8280

# Dedicated Kafka Streams application-id for seat processing
spring.kafka.streams.application-id=tm-seat

# No web server needed — pure Kafka Streams processor
spring.main.web-application-type=none

# No JPA/database needed — this service only uses Kafka Streams state stores
spring.jpa.hibernate.ddl-auto=none
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
