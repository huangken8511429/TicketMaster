apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-processor
  namespace: ticketmaster
spec:
  # 8 replicas × 2 threads = 16 (consumes 2 topics, 輕量路由層)
  replicas: 8
  selector:
    matchLabels:
      app: reservation-processor
  template:
    metadata:
      labels:
        app: reservation-processor
    spec:
      containers:
        - name: reservation-processor
          image: ticketmaster:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: reservation-processor
            - name: SPRING_KAFKA_STREAMS_PROPERTIES_NUM_STREAM_THREADS
              value: "2"
            - name: JAVA_OPTS
              value: "-XX:+UseZGC -XX:+ZGenerational -Xmx1g -Xms1g -XX:+AlwaysPreTouch"
          envFrom:
            - configMapRef:
                name: ticketmaster-config
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
