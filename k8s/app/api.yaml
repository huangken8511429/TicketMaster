apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ticketmaster
spec:
  # 8 replicas for 10K HTTP RPS + KTable consumption
  replicas: 8
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ticketmaster:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: api
            # Pod IP for interactive query routing (KTable on reservation-completed)
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: KAFKA_STREAMS_APP_SERVER
              value: "$(POD_IP):8080"
            - name: SPRING_KAFKA_STREAMS_PROPERTIES_NUM_STREAM_THREADS
              value: "2"
            # ZGC + larger heap for DeferredResults
            - name: JAVA_OPTS
              value: "-XX:+UseZGC -XX:+ZGenerational -Xmx1g -Xms1g -XX:+AlwaysPreTouch"
          envFrom:
            - configMapRef:
                name: ticketmaster-config
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: ticketmaster
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
